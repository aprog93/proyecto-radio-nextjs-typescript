# =============================================================================
# Docker Compose - PRODUCCIÓN VPS (Frontend)
# El backend corre en contenedor separado (../service/)
# =============================================================================

services:
  # Frontend React App
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: radio-cesar-frontend:latest
    container_name: radio-cesar-frontend-prod
    restart: unless-stopped
    environment:
      # Backend URL - puede ser localhost:3005 (desarrollo) o URL externa (producción)
      BACKEND_URL: ${BACKEND_URL:-http://localhost:3005}
    ports:
      - '${FRONTEND_PORT:-3006}:8080'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - radio-cesar-network

networks:
  radio-cesar-network:
    driver: bridge
